<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إعداد اللعبة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="game-ambient.css">
<link rel="stylesheet" href="pro-theme.css">
<style>
:root {
    --cream: #f0e9d2;
    --cream-2: #e8dfc5;
    --black: #111111;
    --orange: #f5a400;
    --white: #ffffff;
    --dot: rgba(0, 0, 0, 0.08);
    --radius: 14px;
    --radius-lg: 20px;
    --shadow-lg: 0 8px 0 rgba(0, 0, 0, 0.15);
    --font: "Tajawal", sans-serif;
    --trans: 0.2s ease;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: var(--font);
    background: var(--cream);
    background-image: radial-gradient(circle, var(--dot) 1.5px, transparent 1.5px);
    background-size: 28px 28px;
    color: var(--black);
    min-height: 100vh;
    overflow-x: hidden;
}

button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    outline: none;
}

a {
    text-decoration: none;
    color: inherit;
}

.page-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 32px 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    justify-content: center;
}

.set-box {
    width: 100%;
    max-width: min(92vw, 680px);
    padding: 32px 40px 36px;
    border-radius: var(--radius-lg);
    background: var(--white);
    border: 2.5px solid var(--black);
    box-shadow: 6px 6px 0 var(--black);
    text-align: center;
}

.set-box .title {
    font-size: 20px;
    font-weight: 900;
    margin-bottom: 8px;
    color: var(--black);
}

.set-box .subtitle {
    font-size: 13px;
    font-weight: 600;
    color: #555;
    margin-bottom: 22px;
    line-height: 1.5;
}

.players-pair {
    margin-bottom: 14px;
}

@media (min-width: 540px) {
    .players-pair {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 14px;
    }

    .players-pair .input-group {
        margin-bottom: 0;
    }
}

.input-group {
    margin-bottom: 14px;
    text-align: right;
}

.input-group label {
    display: block;
    font-size: 13px;
    font-weight: 800;
    color: #333;
    margin-bottom: 6px;
}

input:not([type="range"]),
select {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 2.5px solid var(--black);
    outline: none;
    background: var(--cream);
    color: var(--black);
    font-size: 15px;
    font-weight: 700;
    transition: var(--trans);
}

input:not([type="range"]):focus,
select:focus {
    border-color: var(--orange);
    background: var(--cream-2);
}

input::placeholder {
    color: rgba(17, 17, 17, 0.45);
}

select {
    cursor: pointer;
}

.memorize-panel {
    background: var(--white);
    border-radius: 14px;
    padding: 14px 16px 16px;
    margin-bottom: 18px;
    border: 2.5px solid var(--black);
    box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.12);
}

.memorize-panel fieldset {
    border: none;
    margin: 0;
    padding: 0;
}

.memorize-label {
    display: block;
    color: var(--black);
    font-size: 15px;
    font-weight: 900;
    margin-bottom: 12px;
    text-align: right;
    letter-spacing: 0.02em;
}

.memorize-btns {
    display: flex;
    flex-direction: row;
    gap: 8px;
    flex-wrap: nowrap;
    justify-content: stretch;
}

.memorize-opt {
    flex: 1;
    min-width: 0;
    position: relative;
}

.memorize-opt input {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
    margin: 0;
}

.memorize-opt label {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 6px;
    border-radius: 10px;
    background: var(--cream);
    color: var(--black);
    border: 2.5px solid var(--black);
    cursor: pointer;
    font-size: 14px;
    font-weight: 800;
    transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    user-select: none;
}

.memorize-opt label:hover {
    background: var(--cream-2);
    color: var(--black);
}

.memorize-opt input:focus-visible + label {
    outline: 2px solid var(--orange);
    outline-offset: 2px;
}

.memorize-opt input:checked + label {
    background: var(--orange);
    color: var(--black);
    border-color: var(--black);
}

.slider-group {
    margin-bottom: 18px;
    text-align: right;
}

.slider-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
    flex-wrap: wrap;
}

.slider-head label {
    font-size: 13px;
    font-weight: 800;
    color: #333;
    margin: 0;
}

.slider-value {
    font-size: 15px;
    font-weight: 900;
    color: var(--black);
    min-width: 2.5rem;
    padding: 4px 12px;
    border-radius: 8px;
    border: 2px solid var(--black);
    background: var(--orange);
    text-align: center;
}

.slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    font-weight: 800;
    color: #666;
    margin-top: 6px;
}

.slider-row span:first-child {
    flex: 0 0 auto;
}

.slider-row span:last-child {
    flex: 0 0 auto;
}

input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 14px;
    margin: 0;
    padding: 0;
    background: transparent;
    cursor: pointer;
}

input[type="range"]::-webkit-slider-runnable-track {
    height: 12px;
    border-radius: 6px;
    border: 2.5px solid var(--black);
    background: var(--cream-2);
    box-shadow: inset 0 1px 0 rgba(0, 0, 0, 0.06);
}

input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    margin-top: -7px;
    border-radius: 50%;
    border: 2.5px solid var(--black);
    background: var(--orange);
    box-shadow: 2px 2px 0 var(--black);
}

input[type="range"]::-moz-range-track {
    height: 12px;
    border-radius: 6px;
    border: 2.5px solid var(--black);
    background: var(--cream-2);
}

input[type="range"]::-moz-range-thumb {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2.5px solid var(--black);
    background: var(--orange);
    box-shadow: 2px 2px 0 var(--black);
}

.actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 20px;
    justify-content: center;
}

.actions .btn-play,
.actions .btn-outline {
    flex: 1;
    min-width: 120px;
    justify-content: center;
}

.btn-play {
    background: var(--orange);
    color: var(--black);
    font-size: 16px;
    font-weight: 900;
    padding: 13px 20px;
    border-radius: var(--radius);
    border: 2.5px solid var(--black);
    box-shadow: var(--shadow-lg);
    transition: var(--trans);
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.btn-play:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 0 rgba(0, 0, 0, 0.15);
}

.btn-play:active {
    transform: translateY(2px);
    box-shadow: none;
}

.btn-outline {
    background: var(--white);
    color: var(--black);
    font-size: 16px;
    font-weight: 800;
    padding: 13px 20px;
    border-radius: var(--radius);
    border: 2.5px solid var(--black);
    box-shadow: var(--shadow-lg);
    transition: var(--trans);
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.btn-outline:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 0 rgba(0, 0, 0, 0.15);
    background: var(--cream);
}

.btn-outline:active {
    transform: translateY(2px);
    box-shadow: none;
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.set-box {
    animation: fadeUp 0.5s 0.15s both;
}

@media (max-width: 520px) {
    .page-wrap {
        padding: 28px 16px 48px;
    }

    .set-box {
        padding: 24px 18px 28px;
    }

    .memorize-btns {
        flex-wrap: wrap;
    }

    .memorize-opt {
        flex: 1 1 calc(50% - 4px);
        min-width: calc(50% - 4px);
    }

    .actions {
        flex-direction: column;
    }

    .actions .btn-play,
    .actions .btn-outline {
        width: 100%;
    }
}
</style>
</head>
<body class="game-site">

<div class="page-wrap">
    <div class="set-box">
        <div class="title">إعداد الجولة</div>
        
        <div class="players-pair">
            <div class="input-group">
                <label for="player1">اللاعب الأول</label>
                <input type="text" id="player1" name="player1" autocomplete="nickname" placeholder="اسم اللاعب الأول">
            </div>

            <div class="input-group">
                <label for="player2">اللاعب الثاني</label>
                <input type="text" id="player2" name="player2" autocomplete="nickname" placeholder="اسم اللاعب الثاني">
            </div>
        </div>

        <div class="input-group">
            <label for="roundTime">الوقت لكل دور</label>
            <select id="roundTime" name="roundTime">
                <option value="10">10 ثواني</option>
                <option value="15" selected>15 ثانية</option>
                <option value="30">30 ثانية</option>
                <option value="45">45 ثانية</option>
            </select>
        </div>

        <div class="memorize-panel">
            <fieldset>
                <legend class="memorize-label">وقت الحفظ</legend>
                <div class="memorize-btns" role="presentation">
                    <div class="memorize-opt">
                        <input type="radio" name="memorizeTime" id="memorize3" value="3">
                        <label for="memorize3">3 ث</label>
                    </div>
                    <div class="memorize-opt">
                        <input type="radio" name="memorizeTime" id="memorize5" value="5" checked>
                        <label for="memorize5">5 ث</label>
                    </div>
                    <div class="memorize-opt">
                        <input type="radio" name="memorizeTime" id="memorize8" value="8">
                        <label for="memorize8">8 ث</label>
                    </div>
                    <div class="memorize-opt">
                        <input type="radio" name="memorizeTime" id="memorize10" value="10">
                        <label for="memorize10">10 ث</label>
                    </div>
                </div>
            </fieldset>
        </div>

        <div class="slider-group">
            <div class="slider-head">
                <label for="cardCount">عدد الكروت <span style="font-weight:700;color:#666;">(زوجي فقط)</span></label>
                <span class="slider-value" id="cardCountDisplay" aria-live="polite">20</span>
            </div>
            <input type="range" id="cardCount" name="cardCount" min="10" max="30" value="20" step="2" aria-valuemin="10" aria-valuemax="30" aria-valuenow="20">
            <div class="slider-row">
                <span>10</span>
                <span style="flex:1;"></span>
                <span>30</span>
            </div>
        </div>

        <div class="actions">
            <a href="games.html" class="btn-outline">رجوع للألعاب</a>
            <button type="button" class="btn-play" id="saveSetupBtn">حفظ والمتابعة</button>
        </div>
    </div>
</div>

<script src="js/set.js" defer></script>
<script src="js/ui-effects.js" defer></script>
</body>
</html>
