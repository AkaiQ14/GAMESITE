<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="game-ambient.css">
<link rel="stylesheet" href="pro-theme.css">
<style>
/* مستوحى من تصميم DC QUIZ — https://detectivecoonanquiz.netlify.app/ */
:root {
    --cream: #f0e9d2;
    --cream-2: #e8dfc5;
    --black: #111111;
    --orange: #f5a400;
    --white: #ffffff;
    --dot: rgba(0, 0, 0, 0.08);
    --radius: 14px;
    --radius-lg: 20px;
    --shadow-lg: 0 8px 0 rgba(0, 0, 0, 0.15);
    --font: "Tajawal", sans-serif;
    --trans: 0.2s ease;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: var(--font);
    background: var(--cream);
    background-image: radial-gradient(circle, var(--dot) 1.5px, transparent 1.5px);
    background-size: 28px 28px;
    color: var(--black);
    min-height: 100vh;
    overflow-x: hidden;
}

button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    outline: none;
}

.page-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 32px 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    justify-content: center;
}

.login-box {
    width: 100%;
    max-width: 400px;
    padding: 28px;
    border-radius: var(--radius-lg);
    background: var(--white);
    border: 2.5px solid var(--black);
    box-shadow: 6px 6px 0 var(--black);
    text-align: center;
}

.login-box .title {
    font-size: 20px;
    font-weight: 900;
    margin-bottom: 22px;
    color: var(--black);
}

.input-group {
    margin-bottom: 14px;
    text-align: right;
}

.input-group label {
    display: block;
    font-size: 13px;
    font-weight: 800;
    color: #333;
    margin-bottom: 6px;
}

input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 2.5px solid var(--black);
    outline: none;
    background: var(--cream);
    color: var(--black);
    font-size: 15px;
    font-weight: 700;
    transition: var(--trans);
}

input:focus {
    border-color: var(--orange);
    background: var(--cream-2);
}

input::placeholder {
    color: rgba(17, 17, 17, 0.45);
}

.btn-play {
    width: 100%;
    margin-top: 8px;
    background: var(--orange);
    color: var(--black);
    font-size: 17px;
    font-weight: 900;
    padding: 14px 24px;
    border-radius: var(--radius);
    border: 2.5px solid var(--black);
    box-shadow: var(--shadow-lg);
    transition: var(--trans);
}

.btn-play:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 0 rgba(0, 0, 0, 0.15);
}

.btn-play:active {
    transform: translateY(2px);
    box-shadow: none;
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.login-box {
    animation: fadeUp 0.5s 0.2s both;
}

@media (max-width: 520px) {
    .page-wrap {
        padding: 28px 16px 48px;
    }
}
</style>
</head>
<body class="game-site">

<div class="page-wrap">

    <div class="login-box">
        <div class="title">تسجيل الدخول</div>

        <div class="input-group">
            <label for="username">اسم المستخدم</label>
            <input type="text" id="username" name="username" autocomplete="username" placeholder="أدخل اسم المستخدم">
        </div>

        <div class="input-group">
            <label for="password">كلمة المرور</label>
            <input type="password" id="password" name="password" autocomplete="current-password" placeholder="أدخل كلمة المرور">
        </div>

        <button class="btn-play" type="button" id="loginBtn">تسجيل الدخول</button>
    </div>
</div>

<script src="js/env.config.js"></script>
<script src="js/index.js" defer></script>
<script src="js/ui-effects.js" defer></script>

</body>
</html>
